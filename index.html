<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة القرآن والمصحف المدمج</title>
    <style>
        :root { --accent: #f1c40f; --green: #42e695; --red: #ff4757; --dark-bg: #0f172a; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; padding: 10px; box-sizing: border-box; }
        .container { background: #0f172a; padding: 20px; border-radius: 20px; text-align: center; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* تصميم عارض المصحف */
        .quran-container { display: none; margin-top: 15px; background: #fff; border-radius: 10px; overflow: hidden; border: 2px solid var(--accent); position: relative; }
        .quran-container.active { display: block; }
        #quranImg { width: 100%; height: auto; display: block; min-height: 200px; background: #eee; }
        .quran-nav { display: flex; justify-content: space-between; align-items: center; background: #333; color: #fff; padding: 8px; font-size: 0.9rem; }
        .p-btn { background: var(--accent); border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .main-title { color: var(--accent); margin-bottom: 15px; font-size: 1.4rem; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .mode-btn { padding: 10px; border-radius: 10px; border: none; cursor: pointer; background: #333; color: white; font-size: 0.8rem; }
        .active-mode { background: var(--accent); color: #000; font-weight: bold; }
        .full-width { grid-column: span 2; }

        input, select { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 10px; font-weight: bold; text-align: right; box-sizing: border-box; }
        .quran-toggle { background: var(--green); color: #000; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        .progress-box { display: flex; align-items: center; gap: 10px; margin: 10px 0; font-size: 0.8rem; }
        input[type="range"] { flex: 1; accent-color: var(--green); }
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .play-btn { background: var(--green); width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer; }
        .nav-btn { background: rgba(255,255,255,0.1); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        .footer { margin-top: 20px; font-size: 0.7rem; color: #888; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">إذاعة القرآن والمصحف المدمج</div>

    <button class="quran-toggle" onclick="toggleQuran()">📖 فتح / إغلاق المصحف الورقي</button>

    <div id="quranArea" class="quran-container">
        <img id="quranImg" src="" alt="صفحة المصحف">
        <div class="quran-nav">
            <button class="p-btn" onclick="movePage(1)">السابق</button>
            <span id="pageLabel">صفحة: 1</span>
            <button class="p-btn" onclick="movePage(-1)">التالي</button>
        </div>
    </div>

    <div class="mode-grid" style="margin-top: 15px;">
        <button class="mode-btn active-mode" id="m1" onclick="setMode('مرتل', this)">📖 مرتل</button>
        <button class="mode-btn" id="m2" onclick="setMode('مجود', this)">🎤 مجود</button>
        <button class="mode-btn full-width" onclick="setMode('معلم', this)">👶 مصحف المعلم للأطفال</button>
    </div>

    <input type="text" id="searchInput" placeholder="🔍 ابحث عن قارئ..." oninput="filterReciters(this.value)">
    <select id="reciterSelect" onchange="startAudio()"></select>
    <select id="surahSelect" onchange="startAudio()"></select>

    <div class="progress-box">
        <span id="curTime">0:00</span>
        <input type="range" id="seek" value="0" oninput="seekAudio()">
        <span id="durTime">0:00</span>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="nextSurah()">⏭</button>
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="nav-btn" onclick="prevSurah()">⏮</button>
    </div>

    <div class="footer">صدقة جارية - تطبيق القارئ الشامل</div>
</div>

<audio id="player"></audio>

<script>
    const player = document.getElementById('player');
    const qImg = document.getElementById('quranImg');
    const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
    const surahPages = [1, 2, 50, 77, 106, 128, 151, 177, 187, 208, 221, 235, 249, 255, 262, 267, 282, 293, 305, 312, 322, 332, 342, 350, 359, 367, 377, 385, 396, 404, 411, 415, 418, 428, 434, 440, 446, 453, 458, 467, 477, 483, 489, 496, 499, 502, 507, 511, 515, 518, 520, 523, 526, 528, 531, 534, 537, 542, 545, 549, 551, 553, 554, 556, 558, 560, 562, 564, 567, 568, 570, 572, 574, 575, 577, 578, 580, 582, 583, 585, 587, 587, 589, 591, 591, 593, 594, 595, 596, 597, 597, 598, 599, 599, 600, 600, 601, 601, 602, 602, 603, 603, 603, 604, 604, 604, 604, 604, 604, 604, 604, 604, 604, 604];
    
    let allReciters = [];
    let currentMode = 'مرتل';
    let currentPage = 1;

    async function init() {
        const res = await fetch("https://mp3quran.net/api/v3/reciters?language=ar");
        const data = await res.json();
        allReciters = data.reciters.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
        loadSurahs();
        filterReciters("");
    }

    function loadSurahs() {
        const s = document.getElementById('surahSelect');
        s.innerHTML = surahNames.map((n, i) => `<option value="${(i+1).toString().padStart(3, '0')}">${i+1}. ${n}</option>`).join('');
    }

    function filterReciters(term) {
        const sel = document.getElementById('reciterSelect');
        sel.innerHTML = '<option value="">-- اختر القارئ --</option>';
        allReciters.filter(r => r.name.includes(term)).forEach(r => {
            let m = r.moshaf.find(x => currentMode === 'معلم' ? x.name.includes("معلم") : (currentMode === 'مجود' ? x.name.includes("مجود") : x.name.includes("مرتل")));
            if(m) sel.innerHTML += `<option value="${m.server}">${r.name}</option>`;
        });
    }

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-mode'));
        btn.classList.add('active-mode');
        filterReciters(document.getElementById('searchInput').value);
    }

    function toggleQuran() {
        const area = document.getElementById('quranArea');
        area.classList.toggle('active');
        if(area.classList.contains('active')) syncQuran();
    }

    function syncQuran() {
        const sIndex = document.getElementById('surahSelect').selectedIndex;
        currentPage = surahPages[sIndex];
        showPage();
    }

    function showPage() {
        // استخدام رابط مباشر وموثوق لصور المصحف
        qImg.src = `https://android.quran.com/data/images_1024/page${currentPage.toString().padStart(3, '0')}.png`;
        document.getElementById('pageLabel').innerText = `صفحة: ${currentPage}`;
    }

    function movePage(dir) {
        currentPage += dir;
        if(currentPage < 1) currentPage = 1;
        if(currentPage > 604) currentPage = 604;
        showPage();
    }

    function startAudio() {
        const server = document.getElementById('reciterSelect').value;
        const surah = document.getElementById('surahSelect').value;
        if(!server || !surah) return;
        player.src = `${server}${surah}.mp3`;
        player.play();
        if(document.getElementById('quranArea').classList.contains('active')) syncQuran();
    }

    function togglePlay() { player.paused ? player.play() : player.pause(); }
    player.onplay = () => document.getElementById('playBtn').innerText = "⏸";
    player.onpause = () => document.getElementById('playBtn').innerText = "▶";
    
    player.ontimeupdate = () => {
        const seek = document.getElementById('seek');
        seek.value = (player.currentTime / player.duration) * 100 || 0;
        document.getElementById('curTime').innerText = format(player.currentTime);
        document.getElementById('durTime').innerText = format(player.duration);
    };

    function format(s) { if(isNaN(s)) return "0:00"; let m=Math.floor(s/60), r=Math.floor(s%60); return `${m}:${r<10?'0':''}${r}`; }
    function seekAudio() { player.currentTime = player.duration * (document.getElementById('seek').value / 100); }
    function nextSurah() { document.getElementById('surahSelect').selectedIndex++; startAudio(); }
    function prevSurah() { document.getElementById('surahSelect').selectedIndex--; startAudio(); }

    init();
</script>
</body>
</html>
