<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة القرآن الجامعة والمصحف</title>
    <style>
        :root { --accent: #f1c40f; --green: #42e695; --red: #ff4757; --dark-bg: #0f172a; }
        
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh; display: flex; justify-content: center; 
            align-items: center; color: white; padding: 15px; box-sizing: border-box;
            overflow: hidden;
        }

        .container {
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            padding: 25px 20px; border-radius: 20px; text-align: center;
            width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.1);
        }

        .main-title { color: var(--accent); font-weight: bold; margin-bottom: 20px; font-size: 1.5rem; }

        /* زر المصحف الذكي */
        .mushaf-btn {
            background: linear-gradient(45deg, #d4af37, #f1c40f);
            color: black; border: none; padding: 15px; border-radius: 12px;
            width: 100%; font-weight: bold; font-size: 1.1rem; cursor: pointer;
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.3);
        }

        /* نافذة المصحف المنبثقة */
        .mushaf-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; flex-direction: column;
        }

        .mushaf-header {
            background: #1a1a1a; padding: 12px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--accent);
        }

        .close-mushaf {
            background: var(--red); color: white; border: none; padding: 8px 18px; 
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        .mushaf-frame { width: 100%; flex-grow: 1; border: none; background: white; }

        /* عناصر التحكم */
        input[type="text"], select { width: 100%; padding: 14px; border-radius: 12px; border: none; margin-bottom: 12px; font-weight: bold; text-align: right; }
        .play-btn { background: var(--green); border: none; width: 75px; height: 75px; border-radius: 50%; font-size: 1.8rem; cursor: pointer; color: black; transition: 0.2s; }
        .footer { margin-top: 25px; font-size: 0.8rem; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">إذاعة القرآن الكريم الجامعة</div>
    
    <button class="mushaf-btn" id="openMushafBtn">
        📖 فتح المصحف (سورة <span id="currentSurahNameDisplay">الفاتحة</span>)
    </button>

    <input type="text" id="searchReciter" placeholder="🔍  ابحث عن القارئ...">
    <select id="reciterSelect"></select>
    <select id="surahSelect"></select>

    <div style="margin-top: 20px;">
        <button id="playBtn" class="play-btn">▶</button>
    </div>

    <div class="footer">صدقة جارية لجميع موتى المسلمين - أبو نواف</div>
</div>

<div id="mushafModal" class="mushaf-modal">
    <div class="mushaf-header">
        <span id="mushafTitle" style="color: var(--accent); font-weight: bold;">📖 تصفح السورة</span>
        <button class="close-mushaf" onclick="closeMushaf()">إغلاق المصحف ✖</button>
    </div>
    <iframe id="mushafFrame" class="mushaf-frame" src=""></iframe>
</div>

<audio id="audioPlayer"></audio>

<script>
    const surahSelect = document.getElementById('surahSelect');
    const reciterSelect = document.getElementById('reciterSelect');
    const playBtn = document.getElementById('playBtn');
    const audio = document.getElementById('audioPlayer');
    const mushafModal = document.getElementById('mushafModal');
    const mushafFrame = document.getElementById('mushafFrame');
    const currentSurahNameDisplay = document.getElementById('currentSurahNameDisplay');
    const openMushafBtn = document.getElementById('openMushafBtn');

    const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    // تحديث اسم السورة في الزر عند التغيير
    surahSelect.onchange = () => {
        const name = surahSelect.options[surahSelect.selectedIndex].text.split('. ')[1];
        currentSurahNameDisplay.innerText = name;
        audio.src = ""; // إعادة تعيين الصوت عند تغيير السورة
        playBtn.innerText = "▶";
    };

    // وظيفة فتح المصحف على السورة المختارة برقمها
    openMushafBtn.onclick = () => {
        const surahNumber = parseInt(surahSelect.value); // يأخذ رقم السورة (1, 2, 3...)
        // نستخدم موقع Quran.com مع تمرير رقم السورة مباشرة في الرابط
        mushafFrame.src = `https://quran.com/ar/${surahNumber}`;
        mushafModal.style.display = "flex";
    };

    function closeMushaf() {
        mushafModal.style.display = "none";
        mushafFrame.src = ""; // تفريغ الإطار لتوفير الذاكرة
    }

    // تشغيل الصوت
    playBtn.onclick = () => {
        if(!reciterSelect.value) return;
        if(!audio.src || audio.paused) {
            if(!audio.src) audio.src = `${reciterSelect.value}${surahSelect.value}.mp3`;
            audio.play();
            playBtn.innerText = "⏸";
        } else {
            audio.pause();
            playBtn.innerText = "▶";
        }
    };

    // تهيئة البيانات
    async function init() {
        // تحميل السور
        surahNames.forEach((n, i) => {
            const opt = document.createElement('option');
            opt.value = (i+1).toString().padStart(3, '0');
            opt.text = `${i+1}. ${n}`;
            surahSelect.appendChild(opt);
        });

        // جلب القراء
        try {
            const res = await fetch("https://mp3quran.net/api/v3/reciters?language=ar");
            const data = await res.json();
            const sorted = data.reciters.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
            sorted.forEach(r => {
                let m = r.moshaf.find(m => m.name.includes("مرتل") || m.name === "حفص عن عاصم");
                if(m) {
                    const opt = document.createElement('option');
                    opt.value = m.server; opt.text = r.name;
                    reciterSelect.appendChild(opt);
                }
            });
        } catch(e) {}
    }

    init();
</script>
</body>
</html>
