<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشامل | Quran Read</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #c5a059; /* لون ذهبي هادئ مثل المواقع الفاخرة */
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border: 1px solid #222;
        }

        h1 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 30px;
        }

        /* عارض المصحف الورقي */
        .quran-viewer {
            display: none;
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--accent);
            background: #fff;
        }
        .quran-viewer.active { display: block; }
        #quranImg { width: 100%; height: auto; display: block; }
        
        .quran-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            padding: 10px 20px;
            color: var(--accent);
        }

        /* أدوات التحكم */
        .input-group { margin-bottom: 15px; }
        
        select, input {
            width: 100%;
            background: #1f1f1f;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--accent); }

        .modes {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mode-btn {
            background: #1f1f1f;
            border: 1px solid #333;
            color: #888;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .mode-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: bold;
        }

        /* مشغل الصوت */
        .player-ui {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
        }
        
        .progress-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .main-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }
        .play-pause {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 28px;
            cursor: pointer;
        }

        .view-quran-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .view-quran-btn:hover { background: rgba(197, 160, 89, 0.1); }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>QURAN READ</h1>

    <button class="view-quran-btn" onclick="toggleQuran()">📖 عرض صفحات المصحف</button>

    <div id="quranViewer" class="quran-viewer">
        <img id="quranImg" src="" alt="صفحة المصحف">
        <div class="quran-controls">
            <button class="mode-btn" onclick="changePage(1)">السابق</button>
            <span id="pageInfo">صفحة: 1</span>
            <button class="mode-btn" onclick="changePage(-1)">التالي</button>
        </div>
    </div>

    <div class="modes">
        <button class="mode-btn active" id="m-مرتل" onclick="setMode('مرتل')">مرتل</button>
        <button class="mode-btn" id="m-مجود" onclick="setMode('مجود')">مجود</button>
        <button class="mode-btn" id="m-معلم" onclick="setMode('معلم')">معلم</button>
    </div>

    <div class="input-group">
        <input type="text" id="reciterSearch" placeholder="ابحث عن قارئ..." oninput="filterReciters()">
    </div>
    
    <div class="input-group">
        <select id="reciterSelect" onchange="initAudio()"></select>
    </div>

    <div class="input-group">
        <select id="surahSelect" onchange="initAudio()"></select>
    </div>

    <div class="player-ui">
        <div class="progress-area">
            <span id="currentTime" style="font-size: 12px;">0:00</span>
            <input type="range" id="seekSlider" value="0">
            <span id="duration" style="font-size: 12px;">0:00</span>
        </div>

        <div class="main-controls">
            <button class="nav-btn" onclick="skip(1)">⏭</button>
            <button class="play-pause" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="nav-btn" onclick="skip(-1)">⏮</button>
        </div>
    </div>

    <div class="footer">
        صدقة جارية لجميع المسلمين | تم الدمج بتصميم حديث
    </div>
</div>

<audio id="audioPlayer"></audio>

<script>
    const audio = document.getElementById('audioPlayer');
    const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
    const surahStartPages = [1, 2, 50, 77, 106, 128, 151, 177, 187, 208, 221, 235, 249, 255, 262, 267, 282, 293, 305, 312, 322, 332, 342, 350, 359, 367, 377, 385, 396, 404, 411, 415, 418, 428, 434, 440, 446, 453, 458, 467, 477, 483, 489, 496, 499, 502, 507, 511, 515, 518, 520, 523, 526, 528, 531, 534, 537, 542, 545, 549, 551, 553, 554, 556, 558, 560, 562, 564, 567, 568, 570, 572, 574, 575, 577, 578, 580, 582, 583, 585, 587, 587, 589, 591, 591, 593, 594, 595, 596, 597, 597, 598, 599, 599, 600, 600, 601, 601, 602, 602, 603, 603, 603, 604, 604, 604, 604, 604, 604, 604, 604, 604, 604, 604];

    let reciters = [];
    let currentMode = 'مرتل';
    let currentPage = 1;

    // جلب البيانات
    async function getData() {
        const res = await fetch('https://mp3quran.net/api/v3/reciters?language=ar');
        const data = await res.json();
        reciters = data.reciters;
        initSurahs();
        filterReciters();
    }

    function initSurahs() {
        const s = document.getElementById('surahSelect');
        s.innerHTML = surahNames.map((n, i) => `<option value="${(i+1).toString().padStart(3, '0')}">${i+1}. ${n}</option>`).join('');
    }

    function filterReciters() {
        const term = document.getElementById('reciterSearch').value;
        const sel = document.getElementById('reciterSelect');
        sel.innerHTML = '<option value="">اختر القارئ...</option>';
        reciters.filter(r => r.name.includes(term)).forEach(r => {
            const m = r.moshaf.find(x => currentMode === 'معلم' ? x.name.includes('معلم') : (currentMode === 'مجود' ? x.name.includes('مجود') : x.name.includes('مرتل')));
            if(m) sel.innerHTML += `<option value="${m.server}">${r.name}</option>`;
        });
    }

    function setMode(m) {
        currentMode = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-'+m).classList.add('active');
        filterReciters();
    }

    function initAudio() {
        const srv = document.getElementById('reciterSelect').value;
        const srh = document.getElementById('surahSelect').value;
        if(srv && srh) {
            audio.src = `${srv}${srh}.mp3`;
            audio.play();
            if(document.getElementById('quranViewer').classList.contains('active')) syncPage();
        }
    }

    function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
    audio.onplay = () => document.getElementById('playBtn').innerText = '⏸';
    audio.onpause = () => document.getElementById('playBtn').innerText = '▶';

    function toggleQuran() {
        const v = document.getElementById('quranViewer');
        v.classList.toggle('active');
        if(v.classList.contains('active')) syncPage();
    }

    function syncPage() {
        const idx = document.getElementById('surahSelect').selectedIndex;
        currentPage = surahStartPages[idx];
        updateImg();
    }

    function updateImg() {
        const img = document.getElementById('quranImg');
        img.src = `https://android.quran.com/data/images_1024/page${currentPage.toString().padStart(3, '0')}.png`;
        document.getElementById('pageInfo').innerText = `صفحة: ${currentPage}`;
    }

    function changePage(d) {
        currentPage += d;
        if(currentPage < 1) currentPage = 604;
        if(currentPage > 604) currentPage = 1;
        updateImg();
    }

    // شريط التقدم
    audio.ontimeupdate = () => {
        const seek = document.getElementById('seekSlider');
        if(!isNaN(audio.duration)) {
            seek.value = (audio.currentTime / audio.duration) * 100;
            document.getElementById('currentTime').innerText = fmt(audio.currentTime);
            document.getElementById('duration').innerText = fmt(audio.duration);
        }
    };
    document.getElementById('seekSlider').oninput = function() {
        audio.currentTime = (this.value / 100) * audio.duration;
    };

    function fmt(s) {
        const m = Math.floor(s/60);
        const r = Math.floor(s%60);
        return `${m}:${r<10?'0':''}${r}`;
    }

    function skip(d) {
        const s = document.getElementById('surahSelect');
        if(d === 1) s.selectedIndex++; else s.selectedIndex--;
        initAudio();
    }

    getData();
</script>
</body>
</html>
