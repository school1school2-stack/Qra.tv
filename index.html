<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة القرآن الكريم الجامعة</title>
    <style>
        :root { --accent: #f1c40f; --green: #42e695; --red: #ff4757; --dark-bg: #0f172a; }
        
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh; display: flex; justify-content: center; 
            align-items: center; color: white; padding: 15px; box-sizing: border-box;
        }

        .container {
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            padding: 25px 20px; border-radius: 20px; text-align: center;
            width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .main-title { color: var(--accent); font-weight: bold; margin-bottom: 20px; font-size: 1.6rem; }

        .sections-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        
        .mode-btn { 
            padding: 12px; border-radius: 12px; border: none; cursor: pointer; 
            background: #333; color: white; font-weight: bold; font-size: 0.85rem; transition: 0.3s; 
        }
        .active-mode { background: var(--accent); color: black; box-shadow: 0 0 15px var(--accent); }
        .full-width { grid-column: span 2; }

        input[type="text"], select { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            margin-bottom: 12px; background: white; color: #333; 
            font-size: 1rem; font-weight: bold; outline: none; text-align: right;
        }

        .repeat-box { 
            background: rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; 
            margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; 
        }

        #childOptions { display: none; flex-direction: column; gap: 8px; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; }
        
        .play-btn { 
            background: var(--green); border: none; width: 70px; height: 70px; 
            border-radius: 50%; font-size: 1.8rem; cursor: pointer; color: black;
        }
        .nav-btn { 
            background: rgba(255,255,255,0.1); border: none; color: white; 
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; 
        }

        .footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">إذاعة القرآن الكريم الجامعة</div>
    
    <div class="sections-container">
        <button class="mode-btn active-mode" id="allMode">📖 المصحف المرتل</button>
        <button class="mode-btn" id="mojawadMode">🎤 المصحف المجود</button>
        <button class="mode-btn full-width" id="childMode">👶 قسم الأطفال (تكرار الآيات)</button>
    </div>

    <input type="text" id="searchReciter" placeholder="🔍 ابحث عن قارئ...">
    <select id="reciterSelect"></select>
    <select id="surahSelect"></select>

    <div class="repeat-box">
        <label style="font-size: 0.85rem; font-weight: bold;">🔁 تكرار السورة:</label>
        <select id="surahRepeat" style="width: auto; margin:0; padding:5px;">
            <option value="1">مرة واحدة</option>
            <option value="5">5 مرات</option>
            <option value="10">10 مرات</option>
        </select>
    </div>

    <div id="childOptions">
        <div class="repeat-box" style="background: rgba(66, 230, 149, 0.2); border: 1px solid var(--green);">
            <label style="font-size: 0.85rem; font-weight: bold; color: var(--green);">🔁 تكرار الآية الواحدة:</label>
            <select id="verseRepeat" style="width: auto; margin:0; padding:5px;">
                <option value="1">بدون تكرار</option>
                <option value="3">3 مرات</option>
                <option value="5">5 مرات</option>
                <option value="7">7 مرات</option>
            </select>
        </div>
    </div>
    
    <div id="statusInfo" style="font-size: 0.85rem; color: var(--accent); margin: 10px 0;">جاهز للاستماع...</div>

    <div class="controls">
        <button id="prevBtn" class="nav-btn">⏭</button>
        <button id="playBtn" class="play-btn">▶</button>
        <button id="nextBtn" class="nav-btn">⏮</button>
    </div>

    <div class="footer">صدقة جارية لجميع موتى المسلمين - أبو نواف</div>
</div>

<audio id="audioPlayer"></audio>

<script>
    const audio = document.getElementById('audioPlayer');
    const reciterSelect = document.getElementById('reciterSelect');
    const surahSelect = document.getElementById('surahSelect');
    const statusInfo = document.getElementById('statusInfo');
    const childOptions = document.getElementById('childOptions');
    const verseRepeat = document.getElementById('verseRepeat');
    const surahRepeat = document.getElementById('surahRepeat');

    let currentMode = 'مرتل';
    let currentAyah = 1;
    let totalAyahs = 0;
    let verseCounter = 1;
    let surahCounter = 1;

    const surahData = [0,7,286,200,176,120,165,206,75,129,109,123,111,43,52,99,128,111,110,98,135,112,78,118,64,77,227,93,88,69,60,34,30,73,54,45,83,182,88,75,85,54,53,89,59,37,35,38,29,18,45,60,49,62,55,78,96,29,22,24,13,14,11,11,18,12,12,30,52,52,44,28,28,20,56,40,31,50,40,46,42,29,19,36,25,22,17,19,26,30,20,15,21,11,8,8,19,5,8,8,11,11,8,3,9,5,4,7,3,6,3,5,4,5,6];

    async function init() {
        const res = await fetch("https://mp3quran.net/api/v3/reciters?language=ar");
        const data = await res.json();
        window.allReciters = data.reciters;
        updateList();
    }

    function updateList() {
        reciterSelect.innerHTML = '<option value="">-- اختر القارئ --</option>';
        window.allReciters.forEach(r => {
            let m = r.moshaf.find(m => currentMode === 'معلم' ? m.name.includes("معلم") : m.name.includes("مرتل"));
            if(m) {
                let opt = document.createElement('option');
                opt.value = m.server; opt.text = r.name;
                reciterSelect.appendChild(opt);
            }
        });
        
        surahSelect.innerHTML = '';
        for(let i=1; i<=114; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.text = "سورة " + i;
            surahSelect.appendChild(opt);
        }
    }

    function getAudioUrl() {
        if(currentMode === 'معلم') {
            // نستخدم سيرفر EveryAyah لجلب الآيات منفصلة (القارئ المنشاوي معلم افتراضياً هنا للدقة)
            let s = surahSelect.value.padStart(3, '0');
            let a = currentAyah.toString().padStart(3, '0');
            return `https://www.everyayah.com/data/Menshawi_Teacher_64kbps/${s}${a}.mp3`;
        } else {
            let s = surahSelect.value.padStart(3, '0');
            return `${reciterSelect.value}${s}.mp3`;
        }
    }

    function play() {
        if(!reciterSelect.value) return;
        totalAyahs = surahData[surahSelect.value];
        audio.src = getAudioUrl();
        audio.play();
        updateStatus();
    }

    audio.onended = () => {
        if(currentMode === 'معلم') {
            if(verseCounter < parseInt(verseRepeat.value)) {
                verseCounter++;
                audio.play();
            } else {
                verseCounter = 1;
                if(currentAyah < totalAyahs) {
                    currentAyah++;
                    audio.src = getAudioUrl();
                    audio.play();
                } else {
                    handleSurahEnd();
                }
            }
        } else {
            handleSurahEnd();
        }
        updateStatus();
    };

    function handleSurahEnd() {
        if(surahCounter < parseInt(surahRepeat.value)) {
            surahCounter++;
            currentAyah = 1;
            play();
        } else {
            surahCounter = 1;
            surahSelect.selectedIndex++;
            play();
        }
    }

    function updateStatus() {
        if(currentMode === 'معلم') {
            statusInfo.innerText = `الآية: ${currentAyah} | تكرار الآية: ${verseCounter} من ${verseRepeat.value}`;
        } else {
            statusInfo.innerText = `السورة: ${surahSelect.value} | تكرار السورة: ${surahCounter} من ${surahRepeat.value}`;
        }
    }

    document.getElementById('childMode').onclick = function() {
        currentMode = 'معلم';
        childOptions.style.display = 'block';
        currentAyah = 1;
        updateList();
        this.classList.add('active-mode');
        document.getElementById('allMode').classList.remove('active-mode');
    };

    document.getElementById('allMode').onclick = function() {
        currentMode = 'مرتل';
        childOptions.style.display = 'none';
        updateList();
        this.classList.add('active-mode');
        document.getElementById('childMode').classList.remove('active-mode');
    };

    document.getElementById('playBtn').onclick = play;
    reciterSelect.onchange = play;
    surahSelect.onchange = () => { currentAyah = 1; play(); };

    init();
</script>
</body>
</html>
