<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة القرآن الكريم الجامعة</title>
    <style>
        :root { --accent: #f1c40f; --green: #42e695; --red: #ff4757; --dark-bg: #0f172a; }
        
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh; display: flex; justify-content: center; 
            align-items: center; color: white; padding: 15px; box-sizing: border-box;
        }

        .container {
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            padding: 25px 20px; border-radius: 20px; text-align: center;
            width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .main-title { color: var(--accent); font-weight: bold; margin-bottom: 20px; font-size: 1.6rem; }

        .sections-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        
        .mode-btn { 
            padding: 12px; border-radius: 12px; border: none; cursor: pointer; 
            background: #333; color: white; font-weight: bold; font-size: 0.85rem; 
            transition: 0.3s; 
        }
        .active-mode { background: var(--accent); color: black; box-shadow: 0 0 15px var(--accent); }
        .full-width { grid-column: span 2; }

        input[type="text"], select { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            margin-bottom: 12px; background: white; color: #333; 
            font-size: 1rem; font-weight: bold; outline: none; box-sizing: border-box; text-align: right;
        }

        .repeat-box { 
            background: rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; 
            margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; 
        }

        #childRepeatBox {
            background: rgba(66, 230, 149, 0.15); border: 1px solid var(--green);
            display: none;
        }

        .progress-box { margin: 15px 0; display: flex; align-items: center; gap: 12px; font-size: 0.85rem; }
        input[type="range"] { flex: 1; cursor: pointer; accent-color: var(--green); }

        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; }
        
        .play-btn { 
            background: var(--green); border: none; width: 75px; height: 75px; 
            border-radius: 50%; font-size: 1.8rem; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            color: black; transition: 0.2s; box-shadow: 0 5px 15px rgba(66, 230, 149, 0.3); 
        }
        .nav-btn { 
            background: rgba(255,255,255,0.1); border: none; color: white; 
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; 
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center; 
        }

        .footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">إذاعة القرآن الكريم الجامعة</div>
    
    <div class="sections-container">
        <button class="mode-btn active-mode" id="allMode">📖 المصحف المرتل</button>
        <button class="mode-btn" id="mojawadMode">🎤 المصحف المجود</button>
        <button class="mode-btn full-width" id="childMode">👶 قسم الأطفال (المعلم)</button>
    </div>

    <input type="text" id="searchReciter" placeholder="🔍 ابحث عن قارئ...">
    <select id="reciterSelect"></select>
    <select id="surahSelect"></select>

    <div class="repeat-box" id="generalRepeatBox">
        <label style="font-size: 0.85rem; font-weight: bold;">🔁 تكرار السورة:</label>
        <select id="repeatSelect" style="width: auto; margin:0; padding:5px;"></select>
    </div>

    <div class="repeat-box" id="childRepeatBox">
        <label style="font-size: 0.85rem; font-weight: bold; color: var(--green);">🔁 تكرار للحفظ (1-7):</label>
        <select id="childRepeatSelect" style="width: auto; margin:0; padding:5px;">
            <option value="1">بدون تكرار إضافي</option>
            <option value="3">تكرار 3 مرات</option>
            <option value="5">تكرار 5 مرات</option>
            <option value="7">تكرار 7 مرات</option>
        </select>
    </div>
    
    <div id="repeatStatus" style="font-size: 0.85rem; color: var(--accent); margin-bottom: 10px; min-height: 1.2em;"></div>

    <div class="progress-box">
        <span id="currentTime">0:00</span>
        <input type="range" id="seekSlider" value="0" min="0" step="1">
        <span id="duration">0:00</span>
    </div>

    <div class="controls">
        <button id="prevBtn" class="nav-btn">⏭</button>
        <button id="playBtn" class="play-btn">▶</button>
        <button id="nextBtn" class="nav-btn">⏮</button>
    </div>

    <div class="footer">صدقة جارية لجميع موتى المسلمين - أبو نواف</div>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<script>
    const reciterSelect = document.getElementById('reciterSelect');
    const surahSelect = document.getElementById('surahSelect');
    const repeatSelect = document.getElementById('repeatSelect');
    const childRepeatSelect = document.getElementById('childRepeatSelect');
    const childRepeatBox = document.getElementById('childRepeatBox');
    const repeatStatus = document.getElementById('repeatStatus');
    const playBtn = document.getElementById('playBtn');
    const audio = document.getElementById('audioPlayer');
    const seekSlider = document.getElementById('seekSlider');
    
    let allReciters = [];
    let currentMode = 'مرتل';
    let s_count = 1; // عداد تكرار السورة
    let v_count = 1; // عداد تكرار الأطفال

    const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الالذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    // تعبئة قائمة تكرار السور
    for(let i=1; i<=20; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.text = i == 1 ? "مرة واحدة" : `${i} مرات`;
        repeatSelect.appendChild(opt);
    }

    async function init() {
        try {
            const res = await fetch("https://mp3quran.net/api/v3/reciters?language=ar");
            const data = await res.json();
            allReciters = data.reciters.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
            filterReciters();
            loadSurahs(false);
        } catch(e) { repeatStatus.innerText = "خطأ في الشبكة"; }
    }

    function filterReciters(term = "") {
        reciterSelect.innerHTML = '<option value="">-- اختر القارئ --</option>';
        allReciters.filter(r => term === "" || r.name.includes(term)).forEach(r => {
            let found = r.moshaf.find(m => currentMode === 'معلم' ? m.name.includes("معلم") : (currentMode === 'مجود' ? m.name.includes("مجود") : (m.name.includes("مرتل") || m.name === "حفص عن عاصم")));
            if(found) {
                const opt = document.createElement('option');
                opt.value = found.server; opt.text = r.name;
                reciterSelect.appendChild(opt);
            }
        });
    }

    function loadSurahs(isChild) {
        surahSelect.innerHTML = '';
        surahNames.forEach((n, i) => {
            if(!isChild || i >= 77 || i === 0) { // في وضع المعلم نظهر الفاتحة وجزء عم
                const opt = document.createElement('option');
                opt.value = (i+1).toString().padStart(3, '0');
                opt.text = `${i+1}. ${n}`;
                surahSelect.appendChild(opt);
            }
        });
    }

    function playTrack() {
        if(!reciterSelect.value) return;
        audio.src = `${reciterSelect.value}${surahSelect.value}.mp3`;
        s_count = 1;
        v_count = 1;
        updateStatusText();
        audio.play();
    }

    function updateStatusText() {
        if(currentMode === 'معلم') {
            repeatStatus.innerText = `جاري التكرار للحفظ: ${v_count} من ${childRepeatSelect.value}`;
        } else {
            repeatStatus.innerText = `تكرار السورة: ${s_count} من ${repeatSelect.value}`;
        }
    }

    audio.onended = () => {
        if(currentMode === 'معلم') {
            let vMax = parseInt(childRepeatSelect.value);
            if(v_count < vMax) {
                v_count++;
                updateStatusText();
                audio.currentTime = 0;
                audio.play();
            } else {
                nextTrack();
            }
        } else {
            let sMax = parseInt(repeatSelect.value);
            if(s_count < sMax) {
                s_count++;
                updateStatusText();
                audio.currentTime = 0;
                audio.play();
            } else {
                nextTrack();
            }
        }
    };

    function nextTrack() {
        if(surahSelect.selectedIndex < surahSelect.options.length - 1) {
            surahSelect.selectedIndex++;
            playTrack();
        }
    }

    playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
    document.getElementById('nextBtn').onclick = nextTrack;
    document.getElementById('prevBtn').onclick = () => {
        if(surahSelect.selectedIndex > 0) { surahSelect.selectedIndex--; playTrack(); }
    };

    reciterSelect.onchange = playTrack;
    surahSelect.onchange = playTrack;
    document.getElementById('searchReciter').oninput = (e) => filterReciters(e.target.value);

    // تبديل الأنماط
    const modes = { 'allMode': 'مرتل', 'mojawadMode': 'مجود', 'childMode': 'معلم' };
    Object.keys(modes).forEach(id => {
        document.getElementById(id).onclick = function() {
            currentMode = modes[id];
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-mode'));
            this.classList.add('active-mode');
            
            // إظهار/إخفاء زر تكرار الأطفال
            childRepeatBox.style.display = (currentMode === 'معلم') ? 'flex' : 'none';
            
            loadSurahs(currentMode === 'معلم');
            filterReciters();
            audio.pause();
        };
    });

    audio.ontimeupdate = () => { 
        if(!isNaN(audio.duration)) {
            seekSlider.value = (audio.currentTime/audio.duration)*100;
            document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
            document.getElementById('duration').innerText = formatTime(audio.duration);
        }
    };
    seekSlider.oninput = () => audio.currentTime = audio.duration * (seekSlider.value/100);
    function formatTime(s) { let m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc<10?'0'+sc:sc}`; }
    audio.onplay = () => playBtn.innerText = "⏸";
    audio.onpause = () => playBtn.innerText = "▶";

    init();
</script>
</body>
</html>
