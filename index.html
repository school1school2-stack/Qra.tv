<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة القرآن الكريم الجامعة والمصحف المدمج</title>
    <style>
        :root { --accent: #f1c40f; --green: #42e695; --red: #ff4757; --dark-bg: #0f172a; }
        
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh; display: flex; justify-content: center; 
            align-items: center; color: white; padding: 15px; box-sizing: border-box;
        }

        .container {
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px; text-align: center;
            width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); box-sizing: border-box;
        }

        .main-title { color: var(--accent); font-weight: bold; margin-bottom: 15px; font-size: 1.4rem; }

        /* قسم المصحف المدمج داخل التصميم */
        .quran-display {
            background: #fff; border-radius: 12px; margin-top: 15px;
            padding: 5px; position: relative; display: none; /* يظهر عند الطلب */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .quran-display.active { display: block; }
        .quran-img { width: 100%; border-radius: 8px; display: block; }
        
        .page-ctrl {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 0 0 10px 10px;
            margin-top: -5px; font-size: 0.8rem; color: #fff;
        }
        .p-btn { background: var(--accent); border: none; padding: 4px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* الأنماط والتحكم */
        .sections-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .mode-btn { padding: 10px; border-radius: 10px; border: none; cursor: pointer; background: #333; color: white; font-size: 0.8rem; }
        .active-mode { background: var(--accent); color: black; font-weight: bold; }
        .full-width { grid-column: span 2; }

        input[type="text"], select { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 10px; background: white; color: #333; font-weight: bold; text-align: right; }
        
        .repeat-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; }

        .progress-box { margin: 10px 0; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
        input[type="range"] { flex: 1; accent-color: var(--green); cursor: pointer; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 5px; }
        .play-btn { background: var(--green); border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-btn, .fav-btn { background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .fav-btn.active { color: var(--red); border: 1px solid var(--red); }

        .quran-toggle { background: var(--accent); border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        .footer { margin-top: 20px; font-size: 0.75rem; color: var(--accent); border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-title">إذاعة القرآن الكريم الجامعة</div>
    
    <button class="quran-toggle" id="toggleQuranBtn" onclick="toggleQuranView()">📖 فتح المصحف للقراءة</button>

    <div id="quranArea" class="quran-display">
        <img id="quranImg" src="" class="quran-img" alt="صفحة المصحف">
        <div class="page-ctrl">
            <button class="p-btn" onclick="movePage(1)">السابق</button>
            <span id="pageNum">صفحة: 1</span>
            <button class="p-btn" onclick="movePage(-1)">التالي</button>
        </div>
    </div>

    <div class="sections-container" style="margin-top:15px;">
        <button class="mode-btn active-mode" id="allMode">📖 مرتل</button>
        <button class="mode-btn" id="mojawadMode">🎤 مجود</button>
        <button class="mode-btn full-width" id="childMode">👶 مصحف معلم</button>
    </div>

    <input type="text" id="searchReciter" placeholder="🔍  ابحث عن قارئ...">
    <select id="reciterSelect"></select>
    <select id="surahSelect"></select>

    <div class="repeat-box">
        <span>🔁 تكرار السورة:</span>
        <select id="repeatSelect" style="width: auto; margin:0; padding:2px 5px;"></select>
    </div>
    
    <div id="repeatStatus" style="font-size: 0.8rem; color: var(--accent); margin-bottom: 5px;"></div>

    <div class="progress-box">
        <span id="currentTime">0:00</span>
        <input type="range" id="seekSlider" value="0" min="0" step="1">
        <span id="duration">0:00</span>
    </div>

    <div class="controls">
        <button id="prevBtn" class="nav-btn">⏭</button>
        <button id="addFav" class="fav-btn">❤</button>
        <button id="playBtn" class="play-btn">▶</button>
        <button id="nextBtn" class="nav-btn">⏮</button>
    </div>

    <div class="footer">صدقة جارية لجميع موتى المسلمين - أبو نواف</div>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<script>
    const audio = document.getElementById('audioPlayer');
    const quranArea = document.getElementById('quranArea');
    const quranImg = document.getElementById('quranImg');
    const pageNumDisp = document.getElementById('pageNum');
    const surahSelect = document.getElementById('surahSelect');
    const reciterSelect = document.getElementById('reciterSelect');

    let allReciters = [];
    let currentMode = 'مرتل';
    let currentPage = 1;

    // صفحات بداية السور (مصحف المدينة)
    const surahPages = [1, 2, 50, 77, 106, 128, 151, 177, 187, 208, 221, 235, 249, 255, 262, 267, 282, 293, 305, 312, 322, 332, 342, 350, 359, 367, 377, 385, 396, 404, 411, 415, 418, 428, 434, 440, 446, 453, 458, 467, 477, 483, 489, 496, 499, 502, 507, 511, 515, 518, 520, 523, 526, 528, 531, 534, 537, 542, 545, 549, 551, 553, 554, 556, 558, 560, 562, 564, 567, 568, 570, 572, 574, 575, 577, 578, 580, 582, 583, 585, 587, 587, 589, 591, 591, 593, 594, 595, 596, 597, 597, 598, 599, 599, 600, 600, 601, 601, 602, 602, 603, 603, 603, 604, 604, 604, 604, 604, 604, 604, 604, 604, 604, 604];
    const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    function toggleQuranView() {
        const btn = document.getElementById('toggleQuranBtn');
        quranArea.classList.toggle('active');
        if(quranArea.classList.contains('active')) {
            btn.innerText = "✖ إغلاق المصحف";
            updateQuranImg();
        } else {
            btn.innerText = "📖 فتح المصحف للقراءة";
        }
    }

    function updateQuranImg() {
        if (surahSelect.selectedIndex === -1) return;
        // إذا كانت السورة قد تغيرت، نضبط الصفحة على بدايتها
        currentPage = surahPages[surahSelect.selectedIndex];
        showPage();
    }

    function showPage() {
        quranImg.src = `https://www.searchtruth.org/quran/images2/page-${currentPage.toString().padStart(3, '0')}.png`;
        pageNumDisp.innerText = `صفحة: ${currentPage}`;
    }

    function movePage(dir) {
        currentPage += dir;
        if(currentPage < 1) currentPage = 1;
        if(currentPage > 604) currentPage = 604;
        showPage();
    }

    // تهيئة القوائم والبيانات
    for(let i=1; i<=20; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.text = i == 1 ? "بدون تكرار" : `${i} مرات`;
        document.getElementById('repeatSelect').appendChild(opt);
    }

    async function init() {
        try {
            const res = await fetch("https://mp3quran.net/api/v3/reciters?language=ar");
            const data = await res.json();
            allReciters = data.reciters.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
            filterReciters(); loadSurahs(false);
        } catch(e) { document.getElementById('repeatStatus').innerText = "خطأ في الشبكة"; }
    }

    function filterReciters(term = "") {
        reciterSelect.innerHTML = '<option value="">-- اختر القارئ --</option>';
        allReciters.filter(r => term === "" || r.name.includes(term)).forEach(r => {
            let found = r.moshaf.find(m => currentMode === 'معلم' ? m.name.includes("معلم") : (currentMode === 'مجود' ? m.name.includes("مجود") : (m.name.includes("مرتل") || m.name === "حفص عن عاصم")));
            if(found) { const opt = document.createElement('option'); opt.value = found.server; opt.text = r.name; reciterSelect.appendChild(opt); }
        });
    }

    function loadSurahs(isAmma) {
        surahSelect.innerHTML = '';
        surahNames.forEach((n, i) => {
            if(!isAmma || i >= 77 || i === 0) {
                const opt = document.createElement('option'); opt.value = (i+1).toString().padStart(3, '0');
                opt.text = `${i+1}. ${n}`; surahSelect.appendChild(opt);
            }
        });
    }

    function autoPlay() {
        if(!reciterSelect.value || !surahSelect.value) return;
        audio.src = `${reciterSelect.value}${surahSelect.value}.mp3`;
        audio.play();
        if(quranArea.classList.contains('active')) updateQuranImg();
    }

    document.getElementById('playBtn').onclick = () => audio.paused ? audio.play() : audio.pause();
    reciterSelect.onchange = autoPlay;
    surahSelect.onchange = autoPlay;
    
    audio.onplay = () => document.getElementById('playBtn').innerText = "⏸";
    audio.onpause = () => document.getElementById('playBtn').innerText = "▶";

    document.getElementById('allMode').onclick = function() { currentMode='مرتل'; filterReciters(); };
    document.getElementById('mojawadMode').onclick = function() { currentMode='مجود'; filterReciters(); };
    document.getElementById('childMode').onclick = function() { currentMode='معلم'; filterReciters(); loadSurahs(true); };

    init();
</script>
</body>
</html>
